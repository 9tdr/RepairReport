<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบแจ้งซ่อม - ศูนย์วัฒนธรรมเชียงใหม่</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; }
        .nav-item.active { color: #2563eb; font-weight: 600; }
        .nav-item { color: #6b7280; transition: all 0.2s; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .ticket-card { cursor: pointer; transition: transform 0.1s, box-shadow 0.1s; }
        .ticket-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="text-gray-800 antialiased h-screen flex flex-col overflow-hidden">

    <!-- หน้า Login -->
    <div id="loginView" class="h-full flex items-center justify-center bg-gray-100 p-4 transition-all duration-300">
        <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
            <div class="text-center mb-8">
                <div class="bg-blue-600 text-white w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl shadow-md">
                    <i class="fa-solid fa-wrench"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-800">ระบบแจ้งซ่อม</h1>
                <p class="text-gray-500 text-sm mt-1">ศูนย์วัฒนธรรมเชียงใหม่</p>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">เบอร์โทรศัพท์ (Username)</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-phone text-gray-400"></i>
                        </div>
                        <input type="tel" id="username" class="pl-10 w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="กรอกเบอร์โทรศัพท์" required>
                    </div>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">รหัสผ่าน (Password)</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-lock text-gray-400"></i>
                        </div>
                        <input type="password" id="password" class="pl-10 w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="กรอกรหัสผ่าน" required>
                    </div>
                </div>
                <button type="submit" id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl shadow-md transition-all flex justify-center items-center">
                    เข้าสู่ระบบ
                </button>
            </form>
        </div>
    </div>

    <!-- โครงสร้างหลักของแอป -->
    <div id="appContainer" class="hidden h-full flex-col">
        
        <!-- Header -->
        <header class="bg-white shadow-sm z-10 p-4 flex justify-between items-center shrink-0">
            <div>
                <h2 class="font-bold text-lg text-gray-800" id="headerTitle">แดชบอร์ด</h2>
                <p class="text-xs text-gray-500">ผู้ใช้งาน: <span id="displayUserName" class="font-medium text-blue-600"></span> (<span id="displayUserRole"></span>)</p>
            </div>
            <button onclick="logout()" class="w-10 h-10 rounded-full bg-gray-100 text-gray-600 hover:bg-red-100 hover:text-red-600 flex items-center justify-center transition-colors">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
            </button>
        </header>

        <!-- Content Area -->
        <main class="flex-1 overflow-y-auto bg-gray-50 p-4 pb-24" id="mainContent">
            
            <!-- View: แดชบอร์ด (Admin) -->
            <div id="view-dashboard" class="hidden">
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 text-center">
                        <p class="text-sm text-gray-500 mb-1">รอดำเนินการ</p>
                        <h3 class="text-3xl font-bold text-red-500" id="dashWaiting">0</h3>
                    </div>
                    <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 text-center">
                        <p class="text-sm text-gray-500 mb-1">กำลังดำเนินการ</p>
                        <h3 class="text-3xl font-bold text-yellow-500" id="dashInProgress">0</h3>
                    </div>
                    <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 text-center col-span-2">
                        <p class="text-sm text-gray-500 mb-1">เสร็จสิ้นทั้งหมด</p>
                        <h3 class="text-3xl font-bold text-green-500" id="dashCompleted">0</h3>
                    </div>
                </div>
                
                <div class="bg-white rounded-2xl p-4 shadow-sm border border-red-200">
                    <h4 class="font-bold text-gray-800 mb-3 flex items-center text-red-600">
                        <i class="fa-solid fa-triangle-exclamation mr-2"></i> งานด่วนมาก (รอรับ)
                    </h4>
                    <div id="urgentContainer"></div>
                </div>
            </div>

            <!-- View: ฟอร์มแจ้งซ่อม -->
            <div id="view-newTicket" class="hidden">
                <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                    <h3 class="font-bold text-gray-800 mb-4 border-b pb-2">สร้างใบแจ้งซ่อมใหม่</h3>
                    
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">หมวดหมู่งาน</label>
                        <select id="tCategory" class="w-full px-4 py-3 border border-gray-300 rounded-xl bg-white focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="">-- เลือกหมวดหมู่ --</option>
                            <option value="ไฟฟ้า">ไฟฟ้า / แสงสว่าง</option>
                            <option value="ประปา">ประปา / ห้องน้ำ</option>
                            <option value="แอร์">แอร์ / เครื่องปรับอากาศ</option>
                            <option value="ไอที">คอมพิวเตอร์ / อินเทอร์เน็ต / CCTV</option>
                            <option value="อาคาร">อาคารสถานที่ / โครงสร้าง</option>
                            <option value="อื่นๆ">อื่นๆ</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">รายละเอียดปัญหา</label>
                        <textarea id="tDesc" rows="3" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="อธิบายอาการเสียให้ชัดเจน..."></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">ระดับความเร่งด่วน</label>
                        <div class="grid grid-cols-3 gap-2">
                            <label class="cursor-pointer">
                                <input type="radio" name="priority" value="ทั่วไป" class="peer sr-only" checked>
                                <div class="text-center py-2 px-1 border rounded-lg text-sm peer-checked:bg-green-100 peer-checked:border-green-500 peer-checked:text-green-700 transition-all">ทั่วไป</div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="priority" value="ปานกลาง" class="peer sr-only">
                                <div class="text-center py-2 px-1 border rounded-lg text-sm peer-checked:bg-yellow-100 peer-checked:border-yellow-500 peer-checked:text-yellow-700 transition-all">ปานกลาง</div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="priority" value="ด่วนมาก" class="peer sr-only">
                                <div class="text-center py-2 px-1 border rounded-lg text-sm peer-checked:bg-red-100 peer-checked:border-red-500 peer-checked:text-red-700 transition-all">ด่วนมาก</div>
                            </label>
                        </div>
                    </div>

                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">แนบรูปภาพ (ทางเลือก)</label>
                        <input type="file" id="tCameraInput" accept="image/*" capture="environment" class="hidden" onchange="previewImage(event)">
                        <input type="file" id="tAlbumInput" accept="image/*" class="hidden" onchange="previewImage(event)">
                        
                        <div id="uploadBox" class="grid grid-cols-2 gap-4">
                            <div class="border-2 border-dashed border-gray-300 rounded-xl p-4 text-center bg-gray-50 cursor-pointer hover:bg-gray-100 transition-colors flex flex-col items-center justify-center" onclick="document.getElementById('tCameraInput').click()">
                                <i class="fa-solid fa-camera text-blue-500 text-2xl mb-2"></i>
                                <p class="text-xs font-medium text-gray-600">ถ่ายรูปด้วยกล้อง</p>
                            </div>
                            <div class="border-2 border-dashed border-gray-300 rounded-xl p-4 text-center bg-gray-50 cursor-pointer hover:bg-gray-100 transition-colors flex flex-col items-center justify-center" onclick="document.getElementById('tAlbumInput').click()">
                                <i class="fa-solid fa-images text-green-500 text-2xl mb-2"></i>
                                <p class="text-xs font-medium text-gray-600">เลือกจากคลังภาพ</p>
                            </div>
                        </div>
                        
                        <div id="imagePreviewContainer" class="hidden mt-2 relative">
                            <img id="imagePreview" class="w-full h-44 object-cover rounded-xl border border-gray-200">
                            <button onclick="clearImage()" class="absolute top-2 right-2 bg-red-500 text-white w-8 h-8 rounded-full flex items-center justify-center shadow-md hover:bg-red-600 transition-colors">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>
                    </div>

                    <button id="btnSubmitTicket" onclick="submitTicket()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl shadow-md hover:bg-blue-700 transition-colors flex justify-center items-center">
                        <i class="fa-solid fa-paper-plane mr-2"></i> ส่งแจ้งซ่อม
                    </button>
                </div>
            </div>

            <!-- View: รายการงาน -->
            <div id="view-ticketList" class="hidden">
                <div class="flex overflow-x-auto space-x-2 pb-2 mb-4 no-scrollbar">
                    <button onclick="renderTicketList('ทั้งหมด')" class="shrink-0 px-4 py-1.5 bg-gray-800 text-white rounded-full text-sm font-medium">ทั้งหมด</button>
                    <button onclick="renderTicketList('รอรับงาน')" class="shrink-0 px-4 py-1.5 bg-white border border-gray-200 text-gray-600 rounded-full text-sm font-medium shadow-sm">รอรับงาน</button>
                    <button onclick="renderTicketList('กำลังดำเนินการ')" class="shrink-0 px-4 py-1.5 bg-white border border-gray-200 text-gray-600 rounded-full text-sm font-medium shadow-sm">กำลังทำ</button>
                </div>

                <div id="loadingTickets" class="text-center py-8 hidden">
                    <i class="fa-solid fa-spinner fa-spin text-3xl text-blue-500 mb-2"></i>
                    <p class="text-gray-500 text-sm">กำลังโหลดข้อมูล...</p>
                </div>

                <div id="ticketContainer"></div>
            </div>

        </main>

        <!-- Bottom Navigation -->
        <nav class="bg-white border-t border-gray-200 shrink-0 fixed bottom-0 w-full z-20 pb-safe">
            <div class="flex justify-around items-center h-16" id="bottomNavContainer"></div>
        </nav>
    </div>

    <script>
        // ==========================================
        // ใส่ URL Web App ที่ได้จาก Google Apps Script ตรงนี้ครับ
        // ==========================================
        const API_URL = "https://script.google.com/macros/s/AKfycbxQh5Q9yVQHBDvozPaCt_l7WTZMZYudjdHeZ8wAhipiQxcM2UaU4elCFi6xg7Miu-LPoQ/exec";

        let currentUser = null;
        let globalTickets = []; 
        let compressedImageFile = null; 
        let cachedPassword = ''; 

        // ------------------ ระบบเชื่อมต่อ API หลัก ------------------
        async function callAPI(action, payload = {}) {
            try {
                const requestData = {
                    action: action,
                    username: currentUser ? currentUser.username : document.getElementById('username').value,
                    password: cachedPassword || document.getElementById('password').value,
                    payload: payload
                };

                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(requestData)
                });

                if (!response.ok) throw new Error('Network response was not ok');
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                return { success: false, message: 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต' };
            }
        }

        // ------------------ ระบบ Login ------------------
        async function handleLogin(event) {
            event.preventDefault();
            
            if (API_URL.includes('ใส่_URL')) {
                Swal.fire('แจ้งเตือน', 'กรุณาใส่ URL API ในโค้ด Index.html ก่อน', 'warning');
                return;
            }

            const btn = document.getElementById('loginBtn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังตรวจสอบ...';
            btn.disabled = true;

            const res = await callAPI('login');
            
            btn.innerHTML = 'เข้าสู่ระบบ';
            btn.disabled = false;

            if (res.success) {
                currentUser = res.user;
                cachedPassword = document.getElementById('password').value; 
                
                document.getElementById('displayUserName').textContent = currentUser.name;
                document.getElementById('displayUserRole').textContent = currentUser.role;
                setupNavigation();
                
                document.getElementById('loginView').classList.remove('flex');
                document.getElementById('loginView').classList.add('hidden');
                document.getElementById('appContainer').classList.remove('hidden');
                document.getElementById('appContainer').classList.add('flex');

                if (currentUser.role === 'Admin') navigate('dashboard');
                else navigate('ticketList');
                
                loadData();
                Swal.fire({ icon: 'success', title: `ยินดีต้อนรับคุณ ${currentUser.name}`, toast: true, position: 'top-end', showConfirmButton: false, timer: 1500 });
            } else {
                Swal.fire({ icon: 'error', title: 'ผิดพลาด', text: res.message });
            }
        }

        function logout() {
            Swal.fire({
                title: 'ออกจากระบบ?', icon: 'question', showCancelButton: true,
                confirmButtonColor: '#3085d6', cancelButtonColor: '#d33', confirmButtonText: 'ใช่'
            }).then((result) => {
                if (result.isConfirmed) {
                    currentUser = null; 
                    globalTickets = [];
                    cachedPassword = '';
                    document.getElementById('loginForm').reset();
                    document.getElementById('appContainer').classList.remove('flex');
                    document.getElementById('appContainer').classList.add('hidden');
                    document.getElementById('loginView').classList.remove('hidden');
                    document.getElementById('loginView').classList.add('flex');
                }
            })
        }

        // ------------------ ระบบ Navigation ------------------
        function setupNavigation() {
            const nav = document.getElementById('bottomNavContainer');
            if (currentUser.role === 'Admin') {
                nav.innerHTML = `
                    <button onclick="navigate('dashboard')" class="nav-btn w-full flex flex-col items-center justify-center py-2 nav-item" data-target="dashboard"><i class="fa-solid fa-chart-pie text-xl mb-1"></i><span class="text-[10px]">ภาพรวม</span></button>
                    <button onclick="navigate('ticketList')" class="nav-btn w-full flex flex-col items-center justify-center py-2 nav-item" data-target="ticketList"><i class="fa-solid fa-clipboard-list text-xl mb-1"></i><span class="text-[10px]">งานทั้งหมด</span></button>
                    <button onclick="navigate('newTicket')" class="nav-btn w-full flex flex-col items-center justify-center py-2 nav-item" data-target="newTicket"><div class="bg-blue-600 text-white w-10 h-10 rounded-full flex items-center justify-center -mt-4 shadow-lg border-4 border-white"><i class="fa-solid fa-plus text-lg"></i></div><span class="text-[10px] mt-1 text-blue-600 font-bold">แจ้งซ่อม</span></button>
                    <button onclick="loadData()" class="nav-btn w-full flex flex-col items-center justify-center py-2 nav-item"><i class="fa-solid fa-rotate text-xl mb-1"></i><span class="text-[10px]">รีเฟรช</span></button>
                `;
            } else {
                nav.innerHTML = `
                    <button onclick="navigate('newTicket')" class="nav-btn w-full flex flex-col items-center justify-center py-2 nav-item" data-target="newTicket"><i class="fa-solid fa-plus-circle text-xl mb-1"></i><span class="text-[10px]">แจ้งซ่อมใหม่</span></button>
                    <button onclick="navigate('ticketList')" class="nav-btn w-full flex flex-col items-center justify-center py-2 nav-item" data-target="ticketList"><i class="fa-solid fa-list text-xl mb-1"></i><span class="text-[10px]">งานของฉัน</span></button>
                    <button onclick="loadData()" class="nav-btn w-full flex flex-col items-center justify-center py-2 nav-item"><i class="fa-solid fa-rotate text-xl mb-1"></i><span class="text-[10px]">รีเฟรช</span></button>
                `;
            }
        }

        function navigate(viewId) {
            ['dashboard', 'newTicket', 'ticketList'].forEach(id => document.getElementById(`view-${id}`).classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.remove('hidden');
            const targetBtn = document.querySelector(`.nav-btn[data-target="${viewId}"]`);
            if(targetBtn) targetBtn.classList.add('active');
            const titles = {'dashboard': 'แดชบอร์ดภาพรวม', 'newTicket': 'ฟอร์มแจ้งซ่อม', 'ticketList': currentUser.role === 'Admin' ? 'จัดการงานทั้งหมด' : 'งานแจ้งซ่อมของฉัน'};
            document.getElementById('headerTitle').textContent = titles[viewId];
        }

        // ------------------ ระบบ รูปภาพ ------------------
        function previewImage(event) {
            const file = event.target.files[0];
            if(!file) return;

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function(e) {
                const img = new Image();
                img.src = e.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 600; 
                    let scaleSize = 1;
                    if(img.width > MAX_WIDTH) {
                        scaleSize = MAX_WIDTH / img.width;
                    }
                    canvas.width = img.width * scaleSize;
                    canvas.height = img.height * scaleSize;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.4); 
                    
                    document.getElementById('uploadBox').classList.add('hidden');
                    document.getElementById('imagePreviewContainer').classList.remove('hidden');
                    document.getElementById('imagePreview').src = dataUrl;

                    compressedImageFile = {
                        filename: file.name || 'captured_image.jpg',
                        mimeType: 'image/jpeg',
                        data: dataUrl.split(',')[1] 
                    };
                }
            }
        }

        function clearImage() {
            document.getElementById('tCameraInput').value = '';
            document.getElementById('tAlbumInput').value = '';
            compressedImageFile = null;
            document.getElementById('uploadBox').classList.remove('hidden');
            document.getElementById('imagePreviewContainer').classList.add('hidden');
        }

        // [BUG FIX แก้ไขภาพแตก] ใช้ API Thumbnail ของ Google แทน
        function openImagePopup(driveUrl) {
            if (!driveUrl) return;
            
            let directUrl = driveUrl;
            const match = driveUrl.match(/\/d\/(.+?)\//);
            if (match && match[1]) {
                // ใช้คำสั่ง thumbnail API ของ Google ข้ามข้อจำกัดความปลอดภัย
                directUrl = `https://drive.google.com/thumbnail?id=${match[1]}&sz=w1000`;
            }

            Swal.fire({
                imageUrl: directUrl,
                imageAlt: 'ภาพประกอบแจ้งซ่อม',
                width: '90%',
                padding: '1em',
                showConfirmButton: false,
                showCloseButton: true,
                customClass: {
                    image: 'rounded-xl max-h-[70vh] object-contain shadow-sm'
                }
            });
        }

        // ------------------ ระบบ Data & แจ้งซ่อม (ผ่าน API) ------------------
        async function loadData() {
            document.getElementById('loadingTickets').classList.remove('hidden');
            document.getElementById('ticketContainer').innerHTML = '';

            const res = await callAPI('getTickets');
            
            document.getElementById('loadingTickets').classList.add('hidden');
            if(res.success) {
                globalTickets = res.data;
                renderTicketList('ทั้งหมด');
                if(currentUser.role === 'Admin') updateDashboard(globalTickets);
            } else { 
                Swal.fire('ข้อผิดพลาด', res.message, 'error'); 
            }
        }

        async function submitTicket() {
            const category = document.getElementById('tCategory').value;
            const desc = document.getElementById('tDesc').value;
            const priority = document.querySelector('input[name="priority"]:checked').value;

            if(!category || !desc) {
                Swal.fire('ข้อมูลไม่ครบ', 'กรุณาเลือกหมวดหมู่และกรอกรายละเอียด', 'warning');
                return;
            }

            const btn = document.getElementById('btnSubmitTicket');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังอัปโหลดและบันทึก... (รอสักครู่)';
            btn.disabled = true;

            const payload = {
                category: category,
                description: desc,
                priority: priority,
                imageFile: compressedImageFile 
            };

            const res = await callAPI('saveTicket', payload);
            
            btn.innerHTML = '<i class="fa-solid fa-paper-plane mr-2"></i> ส่งแจ้งซ่อม';
            btn.disabled = false;
            
            if(res.success) {
                Swal.fire({ icon: 'success', title: 'สำเร็จ!', text: `บันทึกงานเลขที่ ${res.ticketId} เรียบร้อย`, timer: 2000, showConfirmButton: false });
                document.getElementById('tCategory').value = '';
                document.getElementById('tDesc').value = '';
                clearImage();
                loadData(); 
                navigate('ticketList'); 
            } else { 
                Swal.fire('ผิดพลาด', res.message, 'error'); 
            }
        }

        // ------------------ ระบบ จัดการงาน (Admin Action ผ่าน API) ------------------
        function openTicketAction(ticketId) {
            if(currentUser.role !== 'Admin') return;

            const ticket = globalTickets.find(t => t.ticketId === ticketId);
            if(!ticket) return;

            Swal.fire({
                title: `จัดการงาน ${ticket.ticketId}`,
                html: `
                    <div class="text-left mt-2">
                        <p class="text-sm text-gray-500 mb-4"><strong>ปัญหา:</strong> ${ticket.description}</p>
                        <label class="block text-sm font-medium mb-1">เปลี่ยนสถานะ</label>
                        <select id="swal-status" class="w-full px-3 py-2 border rounded-lg mb-3 outline-none">
                            <option value="รอรับงาน" ${ticket.status === 'รอรับงาน' ? 'selected' : ''}>รอรับงาน</option>
                            <option value="กำลังดำเนินการ" ${ticket.status === 'กำลังดำเนินการ' ? 'selected' : ''}>กำลังดำเนินการ</option>
                            <option value="เสร็จสิ้น" ${ticket.status === 'เสร็จสิ้น' ? 'selected' : ''}>เสร็จสิ้น</option>
                        </select>
                        <label class="block text-sm font-medium mb-1">หมายเหตุช่าง / วิธีแก้ปัญหา</label>
                        <textarea id="swal-note" rows="2" class="w-full px-3 py-2 border rounded-lg outline-none" placeholder="กรอกข้อมูลเมื่อต้องการปิดงาน...">${ticket.adminNote || ''}</textarea>
                    </div>
                `,
                showCancelButton: true,
                confirmButtonText: 'บันทึกการเปลี่ยนแปลง',
                cancelButtonText: 'ปิด',
                confirmButtonColor: '#2563eb',
                preConfirm: () => {
                    const newStatus = document.getElementById('swal-status').value;
                    const adminNote = document.getElementById('swal-note').value;
                    if(newStatus === 'เสร็จสิ้น' && !adminNote.trim()) {
                        Swal.showValidationMessage('กรุณากรอกวิธีแก้ปัญหาเพื่อเก็บเป็นประวัติ');
                        return false;
                    }
                    return { newStatus, adminNote };
                }
            }).then(async (result) => {
                if(result.isConfirmed) {
                    Swal.fire({title: 'กำลังอัปเดต...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() }});
                    
                    const payload = {
                        ticketId: ticket.ticketId,
                        newStatus: result.value.newStatus,
                        adminNote: result.value.adminNote
                    };

                    const res = await callAPI('updateTicket', payload);
                    
                    if(res.success) {
                        Swal.fire('สำเร็จ', 'อัปเดตสถานะงานเรียบร้อย', 'success');
                        loadData(); 
                    } else { 
                        Swal.fire('ผิดพลาด', res.message, 'error'); 
                    }
                }
            });
        }

        // ------------------ Render UI ------------------
        function getStatusColor(status) {
            if(status === 'รอรับงาน') return 'bg-red-100 text-red-600';
            if(status === 'กำลังดำเนินการ') return 'bg-yellow-100 text-yellow-700';
            if(status === 'เสร็จสิ้น') return 'bg-green-100 text-green-700';
            return 'bg-gray-100 text-gray-600';
        }

        function renderTicketList(filterStatus) {
            const container = document.getElementById('ticketContainer');
            container.innerHTML = '';
            let filtered = globalTickets;
            if(filterStatus !== 'ทั้งหมด') filtered = globalTickets.filter(t => t.status === filterStatus);

            if(filtered.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-400 py-10">ไม่มีรายการแจ้งซ่อม</p>';
                return;
            }

            filtered.forEach(ticket => {
                const colorClass = getStatusColor(ticket.status);
                const isUrgent = ticket.priority === 'ด่วนมาก' ? '<span class="text-[10px] ml-2 font-bold text-white bg-red-500 px-2 py-0.5 rounded">ด่วนมาก</span>' : '';
                
                let dateStr = ticket.date;
                if (typeof dateStr === 'string' && dateStr.includes('T')) {
                    const d = new Date(dateStr);
                    dateStr = d.toLocaleDateString('th-TH') + ' ' + d.toLocaleTimeString('th-TH').substring(0,5);
                }

                let imgBtn = '';
                if(ticket.image && ticket.image.trim() !== '') {
                    imgBtn = `<button onclick="event.stopPropagation(); openImagePopup('${ticket.image}')" class="mt-2 inline-flex items-center text-xs text-blue-600 bg-blue-50 px-2 py-1 rounded-md border border-blue-100"><i class="fa-regular fa-image mr-1"></i> ดูรูปภาพแนบ</button>`;
                }

                const cardHover = currentUser.role === 'Admin' ? 'ticket-card hover:bg-gray-50 border-l-4 border-l-blue-500' : '';
                const clickAction = currentUser.role === 'Admin' ? `onclick="openTicketAction('${ticket.ticketId}')"` : '';

                container.innerHTML += `
                    <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 mb-3 ${cardHover}" ${clickAction}>
                        <div class="flex justify-between items-start mb-2">
                            <div><span class="text-xs font-bold text-gray-500 border border-gray-200 px-2 py-1 rounded-lg">${ticket.ticketId}</span>${isUrgent}</div>
                            <span class="text-xs font-bold ${colorClass} px-2 py-1 rounded-lg">${ticket.status}</span>
                        </div>
                        <h3 class="font-bold text-gray-800 mb-1">[${ticket.category}]</h3>
                        <p class="text-sm text-gray-600 mb-1 whitespace-pre-wrap line-clamp-2">${ticket.description}</p>
                        ${imgBtn}
                        ${ticket.adminNote ? `<div class="mt-2 bg-gray-50 p-2 rounded text-xs border-l-2 border-green-500 text-gray-600"><strong>ช่างตอบกลับ:</strong> ${ticket.adminNote}</div>` : ''}
                        <div class="flex justify-between items-center text-xs text-gray-400 border-t pt-2 mt-2 border-gray-50">
                            <span><i class="fa-regular fa-clock mr-1"></i> ${dateStr}</span>
                            <span>👤 ${ticket.name}</span>
                        </div>
                        ${currentUser.role === 'Admin' && ticket.status !== 'เสร็จสิ้น' ? '<div class="text-right mt-2 text-[10px] text-blue-400"><i class="fa-solid fa-hand-pointer mr-1"></i>แตะเพื่ออัปเดตงาน</div>' : ''}
                    </div>
                `;
            });
        }

        function updateDashboard(tickets) {
            let wait = 0, prog = 0, done = 0;
            let urgentHTML = '';

            tickets.forEach(t => {
                if(t.status === 'รอรับงาน') wait++;
                if(t.status === 'กำลังดำเนินการ') prog++;
                if(t.status === 'เสร็จสิ้น') done++;

                if(t.priority === 'ด่วนมาก' && t.status === 'รอรับงาน') {
                    urgentHTML += `
                        <div class="p-3 bg-red-50 rounded-xl mb-2 border border-red-100 cursor-pointer hover:bg-red-100" onclick="openTicketAction('${t.ticketId}')">
                            <span class="text-xs font-bold text-red-600 bg-red-100 px-2 py-1 rounded">${t.category}</span>
                            <p class="text-sm text-gray-700 mt-1 font-medium">${t.description}</p>
                            <p class="text-[10px] text-gray-500 mt-1">แจ้งโดย: ${t.name} | ${t.ticketId}</p>
                        </div>
                    `;
                }
            });

            document.getElementById('dashWaiting').textContent = wait;
            document.getElementById('dashInProgress').textContent = prog;
            document.getElementById('dashCompleted').textContent = done;
            
            const urgContainer = document.getElementById('urgentContainer');
            urgContainer.innerHTML = urgentHTML !== '' ? urgentHTML : '<p class="text-sm text-gray-400 text-center py-2">ไม่มีงานด่วนค้าง</p>';
        }
    </script>
</body>
</html>
